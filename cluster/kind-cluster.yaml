kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gpu-lab
featureGates:
  DynamicResourceAllocation: true
runtimeConfig:
  resource.k8s.io/v1beta1: "true"
nodes:
- role: control-plane
- role: worker
  labels:
    run.ai/simulated-gpu-node-pool: t4-pool
- role: worker
  labels:
    run.ai/simulated-gpu-node-pool: a100-pool
- role: worker
  labels:
    run.ai/simulated-gpu-node-pool: h100-pool
