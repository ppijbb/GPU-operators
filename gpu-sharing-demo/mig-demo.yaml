---
# MIG 데모 - fake-gpu-operator의 mig-faker로 시뮬레이션
# 실제 MIG는 A100/H100 전용. 여기선 mig-faker가 MIG 프로필을 시뮬레이션함
# 현재 데모는 H100 fake 노드(h100-pool)로 스케줄되도록 맞춘 설정
apiVersion: v1
kind: Pod
metadata:
  name: mig-1g-demo
  namespace: default
  labels:
    app: gpu-sharing-demo
    mode: mig
  annotations:
    run.ai/simulated-gpu-utilization: "70-90"
spec:
  nodeSelector:
    type: kwok
    run.ai/simulated-gpu-node-pool: h100-pool
  tolerations:
  - key: kwok.x-k8s.io/node
    operator: Equal
    value: fake
    effect: NoSchedule
  containers:
  - name: workload
    image: ubuntu:22.04
    command: ["sleep", "infinity"]
    resources:
      limits:
        nvidia.com/mig-1g.10gb: '1'   # H100 MIG 1g 프로파일
    env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
---
apiVersion: v1
kind: Pod
metadata:
  name: mig-2g-demo
  namespace: default
  labels:
    app: gpu-sharing-demo
    mode: mig
  annotations:
    run.ai/simulated-gpu-utilization: "50-70"
spec:
  nodeSelector:
    type: kwok
    run.ai/simulated-gpu-node-pool: h100-pool
  tolerations:
  - key: kwok.x-k8s.io/node
    operator: Equal
    value: fake
    effect: NoSchedule
  containers:
  - name: workload
    image: ubuntu:22.04
    command: ["sleep", "infinity"]
    resources:
      limits:
        nvidia.com/mig-2g.20gb: '1'   # H100 MIG 2g 프로파일
    env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
