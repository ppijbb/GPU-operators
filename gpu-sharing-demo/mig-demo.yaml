---
# MIG 데모 - fake-gpu-operator의 mig-faker로 시뮬레이션
# 실제 MIG는 A100/H100 전용. 여기선 mig-faker가 MIG 프로필을 시뮬레이션함
# gpuProduct가 A100이어야 동작. 현재 클러스터는 T4라 Pending 상태가 정상
apiVersion: v1
kind: Pod
metadata:
  name: mig-1g-demo
  namespace: default
  labels:
    app: gpu-sharing-demo
    mode: mig
  annotations:
    run.ai/simulated-gpu-utilization: "70-90"
spec:
  containers:
  - name: workload
    image: ubuntu:22.04
    command: ["sleep", "infinity"]
    resources:
      limits:
        nvidia.com/mig-1g.10gb: 1   # A100 MIG 1/7 슬라이스 (10GB)
    env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
---
apiVersion: v1
kind: Pod
metadata:
  name: mig-2g-demo
  namespace: default
  labels:
    app: gpu-sharing-demo
    mode: mig
  annotations:
    run.ai/simulated-gpu-utilization: "50-70"
spec:
  containers:
  - name: workload
    image: ubuntu:22.04
    command: ["sleep", "infinity"]
    resources:
      limits:
        nvidia.com/mig-2g.20gb: 1   # A100 MIG 2/7 슬라이스 (20GB)
    env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
