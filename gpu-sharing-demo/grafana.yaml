---
# Grafana - NVIDIA DCGM Exporter 대시보드 포함
# fake-gpu-operator의 nvidia-dcgm-exporter (port 9400) 메트릭을 시각화
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: gpu-operator
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-operated.runai:9090
      access: proxy
      isDefault: true
---
# Prometheus가 없으면 간단한 내장 Prometheus 사용
# (이미 클러스터에 Prometheus 있으면 이 부분 스킵)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gpu-operator
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
    - job_name: 'dcgm-exporter'
      static_configs:
      - targets: ['nvidia-dcgm-exporter:9400']
      metrics_path: /metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gpu-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.51.0
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.retention.time=1h"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gpu-operator
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: gpu-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.4.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
          value: "/var/lib/grafana/dashboards/dcgm.json"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: datasource
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboard-provider
          mountPath: /etc/grafana/provisioning/dashboards
      volumes:
      - name: datasource
        configMap:
          name: grafana-datasource
      - name: dashboard-provider
        configMap:
          name: grafana-dashboard-provider
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: gpu-operator
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: default
      folder: GPU
      type: file
      options:
        path: /var/lib/grafana/dashboards
  # NVIDIA DCGM Exporter 공식 대시보드 (ID: 12239) 임포트 방법:
  # Grafana UI -> Dashboards -> Import -> ID 12239 입력
  # Prometheus datasource 선택 후 Import
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: gpu-operator
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300
  type: NodePort
