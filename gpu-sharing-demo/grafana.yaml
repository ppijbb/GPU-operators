---
# Grafana - NVIDIA DCGM Exporter 대시보드 포함
# fake-gpu-operator의 nvidia-dcgm-exporter (port 9400) 메트릭을 시각화
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: gpu-operator
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      uid: prometheus
      type: prometheus
      url: http://prometheus.gpu-operator.svc:9090
      access: proxy
      isDefault: true
---
# Prometheus가 없으면 간단한 내장 Prometheus 사용
# (이미 클러스터에 Prometheus 있으면 이 부분 스킵)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gpu-operator
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
    - job_name: 'dcgm-exporter'
      static_configs:
      - targets: ['nvidia-dcgm-exporter.gpu-operator.svc:9400']
      metrics_path: /metrics
    - job_name: 'dcgm-exporter-kwok'
      static_configs:
      - targets: ['nvidia-dcgm-exporter-kwok.gpu-operator.svc:9400']
      metrics_path: /metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gpu-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.51.0
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.retention.time=1h"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gpu-operator
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: gpu-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.4.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
          value: "/var/lib/grafana/dashboards/dcgm.json"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: datasource
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboard-provider
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
      volumes:
      - name: datasource
        configMap:
          name: grafana-datasource
      - name: dashboard-provider
        configMap:
          name: grafana-dashboard-provider
      - name: dashboards
        configMap:
          name: grafana-dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: gpu-operator
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: default
      folder: GPU
      type: file
      options:
        path: /var/lib/grafana/dashboards
  # NVIDIA DCGM Exporter 공식 대시보드 (ID: 12239) 추가 임포트 방법:
  # Grafana UI -> Dashboards -> Import -> ID 12239 입력
  # Prometheus datasource 선택 후 Import
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: gpu-operator
data:
  dcgm.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "schemaVersion": 38,
      "title": "NVIDIA DCGM GPU Metrics",
      "uid": "dcgm-gpu",
      "time": {"from": "now-30m", "to": "now"},
      "refresh": "10s",
      "timezone": "browser",
      "panels": [
        {
          "type": "timeseries",
          "title": "GPU Utilization (%)",
          "id": 1,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "DCGM_FI_DEV_GPU_UTIL", "legendFormat": "GPU {{gpu}} ({{Hostname}})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}}
        },
        {
          "type": "timeseries",
          "title": "GPU Memory Used (MiB)",
          "id": 2,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "DCGM_FI_DEV_FB_USED", "legendFormat": "GPU {{gpu}} ({{Hostname}})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}}
        },
        {
          "type": "timeseries",
          "title": "GPU Temperature (°C)",
          "id": 3,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "DCGM_FI_DEV_GPU_TEMP", "legendFormat": "GPU {{gpu}} ({{Hostname}})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "celsius"}}
        },
        {
          "type": "timeseries",
          "title": "GPU Power Usage (W)",
          "id": 4,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "DCGM_FI_DEV_POWER_USAGE", "legendFormat": "GPU {{gpu}} ({{Hostname}})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "watt"}}
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: gpu-operator
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300
  type: NodePort
