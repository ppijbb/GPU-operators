---
# Grafana - NVIDIA DCGM Exporter 대시보드 포함
# fake-gpu-operator의 nvidia-dcgm-exporter (port 9400) 메트릭을 시각화
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: gpu-operator
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      uid: prometheus
      type: prometheus
      url: http://prometheus.gpu-operator.svc:9090
      access: proxy
      isDefault: true
---
# Prometheus가 없으면 간단한 내장 Prometheus 사용
# (이미 클러스터에 Prometheus 있으면 이 부분 스킵)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gpu-operator
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
    - job_name: 'dcgm-exporter'
      static_configs:
      - targets: ['nvidia-dcgm-exporter.gpu-operator.svc:9400']
      metrics_path: /metrics
    - job_name: 'dcgm-exporter-kwok'
      static_configs:
      - targets: ['nvidia-dcgm-exporter-kwok.gpu-operator.svc:9400']
      metrics_path: /metrics
    - job_name: 'kube-state-metrics'
      static_configs:
      - targets: ['kube-state-metrics.gpu-operator.svc:8080']
      metrics_path: /metrics
    - job_name: 'kubelet-cadvisor'
      scheme: https
      tls_config:
        insecure_skip_verify: true
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      kubernetes_sd_configs:
      - role: node
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: gpu-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: gpu-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gpu-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v2.51.0
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.retention.time=1h"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gpu-operator
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: ClusterIP
---
# kube-state-metrics: Pod별 리소스 요청/제한, GPU 할당량 등 K8s 오브젝트 메트릭
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: gpu-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets", "nodes", "pods", "services", "resourcequotas", "replicationcontrollers", "limitranges", "persistentvolumeclaims", "persistentvolumes", "namespaces", "endpoints"]
  verbs: ["list", "watch"]
- apiGroups: ["apps"]
  resources: ["statefulsets", "daemonsets", "deployments", "replicasets"]
  verbs: ["list", "watch"]
- apiGroups: ["batch"]
  resources: ["cronjobs", "jobs"]
  verbs: ["list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["list", "watch"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses", "volumeattachments"]
  verbs: ["list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies", "ingresses"]
  verbs: ["list", "watch"]
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceclaims", "resourceslices"]
  verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics
subjects:
- kind: ServiceAccount
  name: kube-state-metrics
  namespace: gpu-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: gpu-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      containers:
      - name: kube-state-metrics
        image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
        ports:
        - name: http-metrics
          containerPort: 8080
        - name: telemetry
          containerPort: 8081
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: gpu-operator
spec:
  selector:
    app: kube-state-metrics
  ports:
  - name: http-metrics
    port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: gpu-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.4.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
          value: "/var/lib/grafana/dashboards/dcgm.json"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: datasource
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboard-provider
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
      volumes:
      - name: datasource
        configMap:
          name: grafana-datasource
      - name: dashboard-provider
        configMap:
          name: grafana-dashboard-provider
      - name: dashboards
        configMap:
          name: grafana-dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: gpu-operator
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: default
      folder: GPU
      type: file
      options:
        path: /var/lib/grafana/dashboards
  # NVIDIA DCGM Exporter 공식 대시보드 (ID: 12239) 추가 임포트 방법:
  # Grafana UI -> Dashboards -> Import -> ID 12239 입력
  # Prometheus datasource 선택 후 Import
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: gpu-operator
data:
  dcgm.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "schemaVersion": 38,
      "title": "NVIDIA DCGM GPU Metrics",
      "uid": "dcgm-gpu",
      "time": {"from": "now-30m", "to": "now"},
      "refresh": "10s",
      "timezone": "browser",
      "panels": [
        {
          "type": "timeseries",
          "title": "GPU Utilization (%)",
          "id": 1,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "DCGM_FI_DEV_GPU_UTIL", "legendFormat": "GPU {{gpu}} ({{Hostname}})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}}
        },
        {
          "type": "timeseries",
          "title": "GPU Memory Used (MiB)",
          "id": 2,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "DCGM_FI_DEV_FB_USED", "legendFormat": "GPU {{gpu}} ({{Hostname}})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}}
        },
        {
          "type": "timeseries",
          "title": "GPU Temperature (°C)",
          "id": 3,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "DCGM_FI_DEV_GPU_TEMP", "legendFormat": "GPU {{gpu}} ({{Hostname}})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "celsius"}}
        },
        {
          "type": "timeseries",
          "title": "GPU Power Usage (W)",
          "id": 4,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "DCGM_FI_DEV_POWER_USAGE", "legendFormat": "GPU {{gpu}} ({{Hostname}})", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "watt"}}
        },
        {
          "type": "row",
          "title": "Pod-level Metrics",
          "id": 100,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 16},
          "collapsed": false
        },
        {
          "type": "table",
          "title": "Pod GPU Allocation (nvidia.com/gpu)",
          "id": 5,
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 17},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum by (namespace, pod, node) (kube_pod_container_resource_requests{resource=\"nvidia_com_gpu\"})",
            "legendFormat": "{{namespace}}/{{pod}}",
            "refId": "A",
            "format": "table",
            "instant": true
          }],
          "fieldConfig": {"defaults": {"custom": {"align": "auto"}}}
        },
        {
          "type": "table",
          "title": "Pod Memory Requests vs Limits",
          "id": 6,
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 17},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by (namespace, pod) (kube_pod_container_resource_requests{resource=\"memory\"})",
              "legendFormat": "request",
              "refId": "A",
              "format": "table",
              "instant": true
            },
            {
              "expr": "sum by (namespace, pod) (kube_pod_container_resource_limits{resource=\"memory\"})",
              "legendFormat": "limit",
              "refId": "B",
              "format": "table",
              "instant": true
            }
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "type": "timeseries",
          "title": "Pod Memory Usage (working set)",
          "id": 7,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 26},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum by (namespace, pod) (container_memory_working_set_bytes{pod!=\"\",container!=\"\",container!=\"POD\"})",
            "legendFormat": "{{namespace}}/{{pod}}",
            "refId": "A"
          }],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "type": "timeseries",
          "title": "Pod CPU Usage (cores)",
          "id": 8,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 26},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{pod!=\"\",container!=\"\",container!=\"POD\"}[2m]))",
            "legendFormat": "{{namespace}}/{{pod}}",
            "refId": "A"
          }],
          "fieldConfig": {"defaults": {"unit": "none"}}
        },
        {
          "type": "timeseries",
          "title": "Per-Pod GPU Memory Used (MiB) — DCGM with pod mapping",
          "id": 9,
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 34},
          "description": "DCGM exporter가 pod label을 붙여줄 때만 표시됩니다 (kubernetes-pod-mapping 활성화 필요)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "DCGM_FI_DEV_FB_USED * on(gpu, Hostname) group_left(exported_pod, exported_namespace) (DCGM_FI_DEV_FB_USED{exported_pod!=\"\"})",
            "legendFormat": "{{exported_namespace}}/{{exported_pod}} (GPU {{gpu}})",
            "refId": "A"
          }],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}}
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: gpu-operator
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300
  type: NodePort
