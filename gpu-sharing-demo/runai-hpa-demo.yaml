---
# Run:ai 스타일 들쭉날쭉(bursty) 워크로드 데모
# - Deployment + HPA: 추론 서비스 (트래픽에 따라 1~8 replica 오토스케일)
# - Job:               단발성 학습 burst
# - CronJob:           주기적 batch 추론 (2분마다 짧게 폭주)
#
# 모든 Pod에 run.ai/simulated-gpu-utilization 어노테이션을 붙여
# fake-gpu-operator가 DCGM_FI_DEV_GPU_UTIL 메트릭으로 노출하게 함
# → Grafana에서 들쭉날쭉한 GPU util 그래프 확인 가능

---
###############################################################################
# 1) Inference Deployment + HPA (CPU 기반, 즉시 동작)
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runai-inference
  namespace: default
  labels:
    app: runai-inference
    mode: runai-fractional
spec:
  replicas: 2
  selector:
    matchLabels:
      app: runai-inference
  template:
    metadata:
      labels:
        app: runai-inference
        mode: runai-fractional
      annotations:
        # fake-gpu-operator가 이 범위에서 util을 흔들어 줌 → 들쭉날쭉
        run.ai/simulated-gpu-utilization: "30-90"
    spec:
      containers:
      - name: server
        image: polinux/stress
        # CPU를 사인파처럼 흔들어 HPA가 scale up/down 반복하도록
        command: ["/bin/sh", "-c"]
        args:
        - |
          while true; do
            # 30s burst
            stress --cpu 1 --timeout 30s
            # 30s idle
            sleep 30
          done
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
            nvidia.com/gpu: "1"
          limits:
            cpu: 500m
            memory: 128Mi
            nvidia.com/gpu: "1"
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: runai-inference-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: runai-inference
  minReplicas: 1
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
