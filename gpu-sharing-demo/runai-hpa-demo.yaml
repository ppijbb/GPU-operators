---
###############################################################################
# 3) Training Job — 단발성 burst (parallelism으로 동시에 4개 polling)
###############################################################################
apiVersion: batch/v1
kind: Job
metadata:
  name: runai-train-burst
  namespace: default
  labels:
    app: runai-train
    mode: runai-fractional
spec:
  parallelism: 4
  completions: 4
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: runai-train
        mode: runai-fractional
      annotations:
        run.ai/simulated-gpu-utilization: "70-100"  # 학습은 빡세게
    spec:
      restartPolicy: Never
      containers:
      - name: trainer
        image: polinux/stress
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "[$(date)] training on $NODE_NAME";
          stress --cpu 1 --timeout 120s;
          echo "[$(date)] done";
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
            nvidia.com/gpu: "1"
          limits:
            cpu: 500m
            memory: 128Mi
            nvidia.com/gpu: "1"
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

---
###############################################################################
# 4) CronJob — 2분마다 짧은 batch 추론 burst (들쭉날쭉의 핵심)
###############################################################################
apiVersion: batch/v1
kind: CronJob
metadata:
  name: runai-batch-inference
  namespace: default
  labels:
    app: runai-batch
    mode: runai-fractional
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      parallelism: 2
      completions: 2
      backoffLimit: 0
      ttlSecondsAfterFinished: 120
      template:
        metadata:
          labels:
            app: runai-batch
            mode: runai-fractional
          annotations:
            run.ai/simulated-gpu-utilization: "50-80"
        spec:
          restartPolicy: Never
          containers:
          - name: batch
            image: polinux/stress
            command: ["/bin/sh", "-c"]
            args:
            - |
              echo "[$(date)] batch start on $NODE_NAME";
              stress --cpu 1 --timeout 45s;
              echo "[$(date)] batch end";
            resources:
              requests:
                cpu: 100m
                memory: 64Mi
                nvidia.com/gpu: "1"
              limits:
                cpu: 500m
                memory: 128Mi
                nvidia.com/gpu: "1"
            env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
